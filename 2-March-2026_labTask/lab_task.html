<html>
  <head>
     <script src="script.js"></script>

     <title>Login Form</title>
  </head>
  <body>
 
    <form onsubmit="return validateForm()">
      <table >
        <tr>
          <th>SL</th>
          <th>Input Data</th>
          <th>Error</th>
        </tr>
        <tr>
          <td>Student Email <span style="color: red">*</span></td>
          <td>
            <input
              type="text"
              placeholder="Enter your email"
              id="email"
              name=""
            />
          </td>
          <td>
            <p id="emailErr" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>Password</td>
          <td>
            <input
              type="text"
              placeholder="Enter your password"
              id="password"
              name=""
            />
          </td>
          <td>
            <p id="passwordErr" style="color: red"></p>
          </td>
        </tr>
        <tr>
          <td>  </td>
          <td>
            <button  type="submit">Submit</button>
            <input style="margin-left: 60px;" type="reset" value="Reset">
          </td>
          
        </tr>
      </table>
    </form>
  </body>
</html>
